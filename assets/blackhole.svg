<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636.0 316.0" width="636" height="316" role="img" aria-label="Hey, I'm Kayke! Buraco negro em ASCII">
<defs>
<filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
  <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="sharp"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="soft"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="wide"/>
  <feMerge>
    <feMergeNode in="wide"/>
    <feMergeNode in="soft"/>
    <feMergeNode in="sharp"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
<style>
text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'DejaVu Sans Mono',monospace;fill:#818cf8;lengthAdjust:spacing}
.art text{font-size:10px}
.label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:30px;font-weight:600;fill:#818cf8}
</style>
</defs>
<text class="label" x="0" y="158.0" dominant-baseline="middle">Hey, I'm Kayke! 👋</text>
